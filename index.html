<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/EmployAI/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmployAI</title>

    <!--
      FOUC-prevention script for theme.
      Runs synchronously BEFORE React mounts so the right theme class is
      already on <html> when the first paint happens — no light-to-dark flash.
      Mirrors the logic in src/store/theme.js; keep them in sync.
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('employai_theme');
          var dark = stored === 'dark'
            || (!stored && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* private-mode localStorage errors are harmless */ }
      })();
    </script>

    <!--
      SPA-routing decoder — paired with public/404.html.
      If we arrived via the 404 redirect (URL has ?/path), rewrite the URL
      back to the original path so React Router can render the right page.
      Single-Page-Apps for GitHub Pages — MIT licensed
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" crossorigin src="/EmployAI/assets/index-DlgaUGxL.js"></script>
    <link rel="stylesheet" crossorigin href="/EmployAI/assets/index-BOJV9Lau.css">
  </head>

  </body>
</html>
